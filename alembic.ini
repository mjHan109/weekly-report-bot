# Alembic configuration file
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# sys.path modification for env.py
prepend_sys_path = .

# Timezone for migration timestamps (informational only)
# timezone = UTC

# Version locations (space-separated for multiple)
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Database URL is loaded from the application Settings in env.py.
# DO NOT set sqlalchemy.url here — it would hard-code credentials.
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks run after a new migration file is written.
# Uncomment to auto-format with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
